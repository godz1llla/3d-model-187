<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАДАЧИ ПО ДОСТОПРИМЕЧАТЕЛЬНОСТЯМ И ОБЪЕКТАМ ОБНОВЛЕННОЙ КЫЗЫЛОРДЫ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260213">
</head>
<body>
    <!-- Language Switcher -->
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="kz">Қаз</button>
        <button class="lang-btn" data-lang="ru">Рус</button>
        <button class="lang-btn" data-lang="en">Eng</button>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">КӨРІКТІ ҒИМАРАТТАРМЕН ЖАҢАРҒАН ҚЫЗЫЛОРДАНЫҢ НЫСАНДАРЫНДАҒЫ ЕСЕПТЕУЛЕР</h1>
            <p class="hero-intro" id="heroIntro">Интерактивті білім беру сайты</p>
        </div>
    </section>

    <!-- Objects Grid -->
    <section class="objects-section">
        <div class="container">
            <h2 class="section-title" id="objectsTitle">Нысандар</h2>
            <div class="objects-grid" id="objectsGrid">
                <!-- Objects will be loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p id="footerText">© 2026 Білім беру сайты</p>
    </footer>

    <script src="js/lang.js?v=20260213"></script>
    <script src="js/main.js?v=20260213"></script>
</body>
</html>
